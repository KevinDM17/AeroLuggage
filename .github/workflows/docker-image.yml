name: CI/CD AeroLuggage

on:
  push:
    branches:
      - deployment

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "LOWER_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push imagen backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.LOWER_OWNER }}/aeroluggage-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "LOWER_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push imagen frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          build-args: |
            BACKEND_API_BASE_URL=/api
            BACKEND_WS_BASE_URL=
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.LOWER_OWNER }}/aeroluggage-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
    steps:
      - name: Set lowercase owner
        run: echo "LOWER_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Instalar sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Cleanup contenedores y puertos
        run: |
          ssh -o ConnectTimeout=10 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "
            cd /opt/aeroluggage
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            docker rm -f \$(docker ps -aq --filter name=aeroluggage) 2>/dev/null || true
            docker network prune -f 2>/dev/null || true
            sudo systemctl restart docker
            sleep 5
          "

      - name: Desplegar en servidor
        run: |
          ssh -o ConnectTimeout=10 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "
            cd /opt/aeroluggage && \
            git pull origin deployment && \
            export BACKEND_IMAGE='$BACKEND_IMAGE' && \
            export FRONTEND_IMAGE='$FRONTEND_IMAGE' && \
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin && \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull && \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate && \
            echo 'Esperando backend...' && \
            for i in \$(seq 1 50); do
              if curl -sf http://localhost:8082/ > /dev/null 2>&1; then
                echo 'Backend listo'; break
              fi
              echo "Intento \$i de 50..."
              sleep 3
            done && \
            curl -X POST 'http://localhost:8082/api/seed?clean=true' && \
            docker image prune -f
          "
